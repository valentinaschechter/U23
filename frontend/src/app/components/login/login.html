<div class="login-container">
    <h2>Inloggen</h2>
    <div class="home-plate-divider-container">
        <svg class="home-plate-svg" viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
        <path d="M 5,5 L 95,5 L 95,50 L 50,75 L 5,50 Z" 
              fill="none" 
              stroke="#e30613" 
              stroke-width="5" 
              stroke-linejoin="miter" />
    </svg>
    </div>

    @if (errorMessage) {
    <p style="color: red;">{{ errorMessage }}</p>
    }

    <form (ngSubmit)="onLogin()">
        <div>
            <label>Gebruikersnaam:</label>
            <div class="input-wrapper">
                <svg class="input-icon" viewBox="0 0 24 24">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-3.33-8-3.33z"/>
        </svg>
            <input [(ngModel)]="loginData.username" name="username" placeholder="Vul je gebruikersnaam in" required>
            </div>
        </div>

        <div>
            <label>Wachtwoord:</label>
            <div class="input-wrapper">
                <svg class="input-icon" viewBox="0 0 24 24">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
        </svg>
            <input type="password" [(ngModel)]="loginData.password" name="password" placeholder="Vul je wachtwoord in" required>
        </div>
        </div>

        <button type="submit" [disabled]="!loginData.username || !loginData.password">
            <span class="btn-text">Log in</span>
    
    <svg class="player-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <path d="M45,15 C48,12 52,15 50,18 C48,20 44,18 45,15 Z M42,22 L55,25 L62,18 L65,20 L58,28 L55,45 L40,55 L32,42 Z M35,45 L25,65 L15,68 L12,64 L22,60 L30,42 Z M52,43 L60,68 L68,72 L72,68 L62,62 L52,43 Z M56,26 L85,12 L87,15 L58,29 Z" />
    </svg>
        </button>
    </form>
    <div class="curved-text-container">
  <svg viewBox="0 0 500 100" xmlns="http://www.w3.org/2000/svg">
    <path id="subtle-curve" 
          d="M 50,100 Q 250,75 450,100" 
          fill="none" 
          stroke="transparent" />

    <text font-family="'Montserrat', sans-serif" font-weight="900" font-size="15" fill="#111111" letter-spacing="1">
      <textPath href="#subtle-curve" startOffset="50%" text-anchor="middle">
        PLAY HARD. STAY FOCUSED. NEVER QUIT.
      </textPath>
    </text>

    <path d="M 90,105 Q 250,82 410,105" 
          fill="none" 
          stroke="#ffed00" 
          stroke-width="4" 
          stroke-linecap="round" />
  </svg>
</div>
</div>
