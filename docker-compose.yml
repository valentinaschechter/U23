services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: always
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false" # Veiliger voor productie
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Automatische HTTP naar HTTPS redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # SSL Certificaten (Let's Encrypt)
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=zeb.cappaert@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    networks:
      - proxy-net

  db:
    image: mysql:8.0
    container_name: softball_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: softball_db
      MYSQL_USER: zeb
      MYSQL_PASSWORD: ${MYSQL_USER_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend-net

  backend:
    build: ./backend
    container_name: softball_backend
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/softball_db
      - SPRING_DATASOURCE_USERNAME=zeb
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_USER_PASSWORD}
    depends_on:
      - db
    networks:
      - proxy-net
      - backend-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=(Host(`${DOMAIN}`) || (`test.softballu23.eu`))&& PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure" # Gebruik HTTPS
      - "traefik.http.routers.backend.tls.certresolver=myresolver" # Activeer SSL
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy-net"

  frontend:
    build: ./frontend
    container_name: softball_frontend
    restart: always
    networks:
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure" # Gebruik HTTPS
      - "traefik.http.routers.frontend.tls.certresolver=myresolver" # Activeer SSL
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy-net"

  frontend-test:
    build: ../test-frontend/U23/frontend
    container_name: softball_frontend_test
    restart: always
    networks:
      - proxy-net
    labels:
      - "traefik.enable=true"
      # HIER PAS JE HET DOMEIN AAN:
      - "traefik.http.routers.frontend-test.rule=Host(`test.softballu23.eu`)"
      - "traefik.http.routers.frontend-test.entrypoints=websecure"
      - "traefik.http.routers.frontend-test.tls.certresolver=myresolver"
      - "traefik.http.services.frontend-test.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy-net"

networks:
  proxy-net:
    name: proxy-net
  backend-net:
    name: backend-net

volumes:
  mysql_data: